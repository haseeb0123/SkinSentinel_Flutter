name: my_app
description: "SkinSentinel - AI-Powered Skin Cancer Detection"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase Services ---
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.1

  # --- Security & Authentication ---
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.0.0 # <--- Ye add kar di hai credentials save karne ke liye

  # --- Storage & Utils ---
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1

  # --- AI & Image Processing ---
  tflite_flutter: ^0.12.0
  google_generative_ai: ^0.4.7
  image: ^4.1.3
  image_picker: ^1.1.2

  # --- UI & Animations ---
  animated_text_kit: ^4.2.2
  torch_light: ^1.0.1
  share_plus: ^10.1.0

  # --- Networking & Maps ---
  http: ^1.2.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.1 # <--- ✅ Yeh upar wala maps open karne wala package add ho gaya hai

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/labels.txt
    - assets/SkinSentinel_PRO_V3.tflite
    - assets/images/
    - assets/images/google.png
    - assets/images/placeholder_scan.png
    - assets/icon/