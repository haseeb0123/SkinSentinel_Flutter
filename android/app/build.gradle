plugins {
    id "com.android.application"
    id 'com.google.gms.google-services'
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.my_app"

    // ✅ Updated to 36 because your TFLite package requires it
    compileSdk = 36
    ndkVersion = "25.1.8937393"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // ✅ Prevents model corruption
    aaptOptions {
        noCompress 'tflite'
        noCompress 'lite'
    }

    defaultConfig {
        applicationId = "com.example.my_app"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36 // ✅ Matches compileSdk for stability
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // ✅ Essential for large apps with Firebase & TFLite
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig = signingConfigs.debug
        }
    }

    // ✅ High memory allocation for 210MB model processing
    dexOptions {
        javaMaxHeapSize "4g"
    }
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
}

flutter {
    source = "../.."
}
